# fly.dev.toml app configuration for development deployment
# Usage: flyctl deploy -c fly.dev.toml

app = "manibot-dev"
primary_region = "ams"

[build]
	# Optional: bootstrap yt-dlp in the image (docker-entrypoint upgrades from GitHub on each machine start when newer)
	# args = { YTDLP_VERSION = "2026.03.17" }

[vm]
	cpu_kind = "shared"
	cpus = 1
	memory = "768mb"
